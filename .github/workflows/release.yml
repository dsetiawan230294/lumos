name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: windows, goarch: amd64, ext: .exe }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          check-latest: true
      - name: build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          OUT="lumos_${VERSION}_${GOOS}_${GOARCH}${{ matrix.ext }}"
          go build -trimpath \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o "dist/${OUT}" ./cmd/lumos
      - name: checksum
        run: |
          cd dist
          shasum -a 256 * > "SHA256SUMS.${{ matrix.goos }}_${{ matrix.goarch }}"
      - uses: actions/upload-artifact@v4
        with:
          name: lumos-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true
      - name: aggregate checksums
        run: |
          cd artifacts
          cat SHA256SUMS.* > SHA256SUMS.txt
          rm SHA256SUMS.*
      - name: github release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
