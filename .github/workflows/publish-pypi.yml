name: publish-pypi

on:
  push:
    tags:
      - 'py-v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Override version (optional, e.g. 0.1.0). Leave blank to use pyproject.toml.'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  build:
    name: build sdist + wheel
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pkg/lumos/python
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: install build tooling
        run: python -m pip install --upgrade pip build twine

      - name: override version (optional)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.version != '' }}
        run: |
          python - <<'PY'
          import re, pathlib
          p = pathlib.Path("pyproject.toml")
          s = p.read_text()
          s = re.sub(r'^version = ".*"$', f'version = "${{ inputs.version }}"', s, count=1, flags=re.M)
          p.write_text(s)
          PY
          grep '^version' pyproject.toml

      - name: build
        run: python -m build

      - name: check artifacts
        run: python -m twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: pkg/lumos/python/dist/*

  publish:
    name: publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for PyPI Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true
