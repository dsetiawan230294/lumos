version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - bodyclose
    - errcheck
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - unconvert
    - unused
  settings:
    errcheck:
      exclude-functions:
        - (io.Closer).Close
        - (*os.File).Close
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - io.Copy
        - (*os/exec.Cmd).Wait
    staticcheck:
      checks:
        - all
        - "-ST1003" # naming conventions
        - "-ST1011" # variable name describes unit (e.g. CooldownSec time.Duration)
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - unparam
          - unused

formatters:
  enable:
    - gofmt
    - goimports
